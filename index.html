  <!-- Base Engine Styles -->
  <style>
    /* === RESET & ROOT === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body, 'Georgia', serif);
      background: var(--color-bg, #0e0b07);
      color: var(--color-text, #e8ddd0);
      overflow-x: hidden;
      min-height: 100dvh;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* === LOADING SCREEN === */
    #engine-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0806;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #engine-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-emblem {
      width: 64px; height: 64px;
      border: 1.5px solid rgba(200,170,120,0.3);
      border-top-color: rgba(200,170,120,0.9);
      border-radius: 50%;
      animation: loaderSpin 1s linear infinite;
    }
    .loader-text {
      margin-top: 20px;
      font-family: 'Georgia', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(200,170,120,0.5);
    }
    @keyframes loaderSpin { to { transform: rotate(360deg); } }

    /* === MAIN WRAPPER === */
    #invitation-wrapper {
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #invitation-wrapper.ready { opacity: 1; }

    /* === SCROLL REVEAL BASE === */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }

    /* === SECTION BASE === */
    .section-block {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    /* === UTILITY === */
    .text-center { text-align: center; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  </style>

  <!-- Theme CSS injected dynamically by theme-loader -->
  <link id="theme-stylesheet" rel="stylesheet" href="" />

  <!-- Module CSS injected dynamically by module-loader -->
  <div id="module-styles"></div>
</head>
<body>

  <!-- Engine Loader -->
  <div id="engine-loader" role="status" aria-label="Loading invitation...">
    <div class="loader-emblem"></div>
    <p class="loader-text">Loading Invitation</p>
  </div>

  <!-- Music Player (always present, toggled by config) -->

  <!-- Opening Screen (rendered by opening module) -->
  <div id="opening-module-mount"></div>

  <!-- Main Invitation Content -->
  <main id="invitation-wrapper" role="main">
    <div id="couple-module-mount"></div>
    <div id="countdown-module-mount"></div>
    <div id="story-module-mount"></div>
    <div id="timeline-module-mount"></div>
    <div id="gallery-module-mount"></div>
    <div id="rsvp-module-mount"></div>
    <div id="guestbook-module-mount"></div>
    <div id="gift-module-mount"></div>
    <div id="footer-module-mount"></div>
  </main>

  <!-- Core Engine Scripts -->

  <!-- Boot -->

    // Victor Invitation Engine V1 — Boot
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof VictorEngine !== 'undefined') {
        VictorEngine.boot();
      }
    });
  </script>
</body>
