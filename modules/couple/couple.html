<section id="couple-section" class="section-block couple-section" aria-labelledby="couple-heading">
  <div class="couple-bg" aria-hidden="true">
    <div class="couple-bg-pattern"></div>
  </div>

  <div class="couple-container">
    <header class="section-header reveal">
      <p class="section-label">Bismillahirrahmanirrahim</p>
      <h2 class="section-title" id="couple-heading">Kami Yang Berbahagia</h2>
      <div class="section-divider" aria-hidden="true"><span></span><span class="divider-gem">◆</span><span></span></div>
    </header>

    <div class="couple-cards">
      <!-- Bride -->
      <article class="couple-card reveal reveal-delay-1" id="bride-card">
        <div class="couple-photo-frame">
          <div class="couple-photo-border" aria-hidden="true"></div>
          <img class="couple-photo" id="bride-photo" src="" alt="Foto Mempelai Wanita" loading="lazy" />
        </div>
        <div class="couple-card-body">
          <p class="couple-role">Mempelai Wanita</p>
          <h3 class="couple-name" id="bride-full-name"></h3>
          <p class="couple-parents" id="bride-parents"></p>
        </div>
      </article>

      <!-- Ampersand -->
      <div class="couple-and reveal reveal-delay-2" aria-hidden="true">
        <span class="couple-and-symbol">&amp;</span>
        <div class="couple-and-lines">
          <span></span><span class="and-dot">◆</span><span></span>
        </div>
      </div>

      <!-- Groom -->
      <article class="couple-card reveal reveal-delay-3" id="groom-card">
        <div class="couple-photo-frame">
          <div class="couple-photo-border" aria-hidden="true"></div>
          <img class="couple-photo" id="groom-photo" src="" alt="Foto Mempelai Pria" loading="lazy" />
        </div>
        <div class="couple-card-body">
          <p class="couple-role">Mempelai Pria</p>
          <h3 class="couple-name" id="groom-full-name"></h3>
          <p class="couple-parents" id="groom-parents"></p>
        </div>
      </article>
    </div>

    <!-- Event Details -->
    <div class="event-details reveal reveal-delay-4" id="event-details">
      <!-- Injected by JS -->
    </div>

    <!-- Maps Button -->
    <div class="event-maps reveal reveal-delay-5" id="event-maps-btn-wrap">
      <!-- Injected by JS -->
    </div>
  </div>
</section>
