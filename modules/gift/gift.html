<section id="gift-section" class="section-block gift-section" aria-labelledby="gift-heading">
  <div class="gift-container">
    <header class="section-header reveal">
      <p class="section-label">Hadiah Pernikahan</p>
      <h2 class="section-title" id="gift-heading">Wedding Gift</h2>
      <div class="section-divider" aria-hidden="true"><span></span><span class="divider-gem">◆</span><span></span></div>
      <p class="section-desc reveal reveal-delay-1">Doa restu Anda adalah hadiah terbesar kami. Namun bagi yang ingin memberikan hadiah, berikut informasinya.</p>
    </header>

    <div class="gift-tabs reveal reveal-delay-2">
      <button class="gift-tab active" data-tab="bank" aria-selected="true">Transfer Bank</button>
      <button class="gift-tab" data-tab="address" aria-selected="false">Kirim Kado</button>
    </div>

    <div id="gift-bank-panel" class="gift-panel">
      <div id="gift-bank-list" class="gift-bank-list">
        <!-- Injected by JS -->
      </div>
    </div>

    <div id="gift-address-panel" class="gift-panel hidden">
      <div class="gift-address-card" id="gift-address-card">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>
</section>
