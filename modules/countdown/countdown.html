<section id="countdown-section" class="section-block countdown-section" aria-labelledby="countdown-heading">
  <div class="countdown-bg" aria-hidden="true"></div>
  <div class="countdown-container">
    <header class="section-header reveal">
      <p class="section-label">Menuju Hari Bahagia</p>
      <h2 class="section-title" id="countdown-heading">Hitung Mundur</h2>
      <div class="section-divider" aria-hidden="true"><span></span><span class="divider-gem">◆</span><span></span></div>
    </header>

    <div class="countdown-grid reveal reveal-delay-2" id="countdown-grid" role="timer" aria-live="off">
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-days">00</span>
        <span class="countdown-label">Hari</span>
      </div>
      <div class="countdown-sep" aria-hidden="true">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-hours">00</span>
        <span class="countdown-label">Jam</span>
      </div>
      <div class="countdown-sep" aria-hidden="true">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-minutes">00</span>
        <span class="countdown-label">Menit</span>
      </div>
      <div class="countdown-sep" aria-hidden="true">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-seconds">00</span>
        <span class="countdown-label">Detik</span>
      </div>
    </div>

    <p class="countdown-ended hidden reveal reveal-delay-3" id="countdown-ended">
      ✦ Hari pernikahan telah tiba ✦
    </p>

    <p class="countdown-date reveal reveal-delay-3" id="countdown-date-label"></p>
  </div>
</section>
