<section id="gallery-section" class="section-block gallery-section" aria-labelledby="gallery-heading">
  <div class="gallery-container">
    <header class="section-header reveal">
      <p class="section-label">Momen Kami</p>
      <h2 class="section-title" id="gallery-heading">Galeri Foto</h2>
      <div class="section-divider" aria-hidden="true"><span></span><span class="divider-gem">◆</span><span></span></div>
    </header>
    <div class="gallery-grid" id="gallery-grid" role="list">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Lightbox -->
  <div class="gallery-lightbox hidden" id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Photo Lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="Gallery photo" />
    </div>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
  </div>
</section>
