<section id="opening-screen" class="opening-screen" aria-label="Opening Screen" role="dialog" aria-modal="true">
  <div class="opening-bg" id="opening-bg"></div>
  <div class="opening-particles" id="opening-particles" aria-hidden="true"></div>
  <div class="opening-overlay" aria-hidden="true"></div>

  <div class="opening-content">
    <div class="opening-ornament top" aria-hidden="true">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>

    <p class="opening-label reveal" id="opening-guest-prefix"></p>
    <h1 class="opening-guest-name reveal reveal-delay-1" id="opening-guest-name"></h1>

    <div class="opening-divider reveal reveal-delay-2" aria-hidden="true">
      <span class="opening-divider-line"></span>
      <span class="opening-divider-icon">✦</span>
      <span class="opening-divider-line"></span>
    </div>

    <p class="opening-intro reveal reveal-delay-3">Bersama keluarga kami, dengan penuh kebahagiaan mengundang kehadiran Anda dalam perayaan pernikahan kami</p>

    <div class="opening-names reveal reveal-delay-4">
      <span class="opening-bride" id="opening-bride"></span>
      <span class="opening-ampersand" aria-hidden="true">&amp;</span>
      <span class="opening-groom" id="opening-groom"></span>
    </div>

    <div class="opening-date reveal reveal-delay-5" id="opening-date"></div>

    <div class="opening-ornament bottom" aria-hidden="true">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>

    <button class="opening-btn reveal reveal-delay-5" id="opening-btn" aria-label="Buka Undangan">
      <span class="opening-btn-icon" aria-hidden="true">✦</span>
      <span class="opening-btn-text" id="opening-btn-text">Buka Undangan</span>
      <span class="opening-btn-icon" aria-hidden="true">✦</span>
    </button>
  </div>
</section>
